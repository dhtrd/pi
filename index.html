<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>نظام التقارير اليومية</title>
<meta name="theme-color" content="#182A46">
<meta name="description" content="نظام التقارير اليومية والخزينة الموحّدة">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="التقارير اليومية">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F1EEE7; --card:#FFFFFF; --ink:#182A46; --ink-2:#22406e; --ink-soft:#42506B;
  --muted:#8A93A6; --line:#E6E2D8; --line-soft:#F0EDE6;
  --brass:#B08D3F; --brass-deep:#8A6D2C; --brass-tint:#FBF4E2;
  --teal:#2F6F5B; --teal-tint:#E7F1EC; --clay:#B4472E; --clay-tint:#F8E9E4;
  --amber:#C08A2E; --amber-tint:#FBF1DE; --blue:#2E5E8A; --blue-tint:#E7EFF6;
  --shadow:0 1px 2px rgba(24,42,70,.04),0 10px 28px rgba(24,42,70,.07);
  --shadow-sm:0 1px 2px rgba(24,42,70,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Tajawal',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums lining-nums}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d8d3c7;border-radius:10px}

/* ---------- shell ---------- */
.demo-banner{background:linear-gradient(90deg,var(--brass-deep),var(--brass));color:#fff;text-align:center;
  font-size:12.5px;font-weight:700;padding:6px 12px;letter-spacing:.1px}
.topbar{position:sticky;top:0;z-index:110;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:9px 16px;height:54px}
.ham{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;
  color:var(--ink);font-size:17px;transition:.12s}
.ham:hover{border-color:var(--brass);color:var(--brass-deep)}
.tb-title{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px}
.tb-logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(145deg,var(--ink),#2b4d84);display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;position:relative}
.tb-logo::after{content:"";position:absolute;inset:3px;border:1px solid rgba(176,141,63,.6);border-radius:6px}
.tb-actions{margin-inline-start:auto;display:flex;align-items:center;gap:10px}
.tb-conn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--amber);
  background:var(--amber-tint);border:1px solid #EEDFB9;padding:4px 11px;border-radius:20px}
.tb-conn .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.app{display:grid;grid-template-columns:1fr 264px;min-height:calc(100vh - 84px);transition:grid-template-columns .2s ease}
body.nav-collapsed .app{grid-template-columns:1fr}
.side{background:var(--ink);color:#cdd6e6;padding:18px 14px;display:flex;flex-direction:column;gap:4px;
  position:sticky;top:54px;height:calc(100vh - 54px);transition:transform .22s ease,width .2s ease,opacity .18s ease;overflow-y:auto}
@media(min-width:1001px){ body.nav-collapsed .side{width:0;padding:0;opacity:0;overflow:hidden;pointer-events:none} }
.side .logo{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;border-bottom:1px solid #2b4066;margin-bottom:12px}
.side .logo .mk{width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,#24406e,#2b4d84);display:grid;place-items:center;color:#fff;font-weight:800;position:relative;flex:none}
.side .logo .mk::after{content:"";position:absolute;inset:3px;border:1px solid rgba(176,141,63,.6);border-radius:8px}
.side .logo h1{font-size:15px;color:#fff;font-weight:800}
.side .logo p{font-size:11px;color:#8ea0c0;font-weight:500}
.nav{border:0;background:transparent;color:#cdd6e6;text-align:right;padding:11px 12px;border-radius:10px;
  font-size:14px;font-weight:600;display:flex;align-items:center;gap:11px;width:100%;transition:.12s}
.nav:hover{background:#22386080;color:#fff}
.nav.on{background:linear-gradient(90deg,#24406e,#284a80);color:#fff;box-shadow:inset 0 0 0 1px #345189}
.nav .ic{width:20px;text-align:center;font-size:15px;opacity:.9}
.side .spacer{flex:1;min-height:12px}
.side .conn{background:#20355a;border:1px solid #2f4d7a;border-radius:11px;padding:11px;font-size:11.5px;color:#9fb0cf}
.side .conn b{color:#e7c877;font-weight:700}
.side .conn .st{display:inline-flex;align-items:center;gap:6px;margin-top:5px;color:#cdd6e6;font-weight:600}
.side .conn .dot{width:7px;height:7px;border-radius:50%;background:#C08A2E;box-shadow:0 0 0 3px #c08a2e33}
.backdrop{display:none;position:fixed;inset:0;background:rgba(24,42,70,.45);z-index:115}

.main{padding:24px 30px 60px;overflow-x:hidden}
.pagehead{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.pagehead h2{font-size:22px;font-weight:800;letter-spacing:-.3px}
.pagehead .sub{font-size:13px;color:var(--muted);font-weight:500;margin-top:2px}

/* ---------- generic ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.btn{border:1px solid var(--line);background:var(--card);font-weight:700;font-size:13px;color:var(--ink-soft);
  padding:8px 14px;border-radius:10px;display:inline-flex;gap:7px;align-items:center;transition:.12s}
.btn:hover{border-color:var(--brass);color:var(--brass-deep)}
.btn.pri{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.pri:hover{background:var(--ink-2);color:#fff}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:9px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;border:1px solid transparent;white-space:nowrap}
.chip .d{width:6px;height:6px;border-radius:50%}
.chip.verified,.chip.completed{background:var(--teal-tint);color:var(--teal);border-color:#CBE3D7}.chip.verified .d,.chip.completed .d{background:var(--teal)}
.chip.pending{background:var(--amber-tint);color:var(--amber);border-color:#EEDFB9}.chip.pending .d{background:var(--amber)}
.chip.review,.chip.error{background:var(--clay-tint);color:var(--clay);border-color:#EFCFC4}.chip.review .d,.chip.error .d{background:var(--clay)}
.neg{color:var(--clay)!important}
.muted{color:var(--muted)}

/* ---------- dashboard ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.kpi{padding:16px 17px}
.kpi .lbl{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px;margin-bottom:9px}
.kpi .val{font-size:24px;font-weight:800;letter-spacing:-.4px}
.kpi .val small{font-size:12px;color:var(--muted);font-weight:600;margin-inline-start:3px}
.kpi .dot{width:8px;height:8px;border-radius:50%}
.kpi.hero{grid-column:span 1;background:linear-gradient(160deg,#1b2e51,#25457a);color:#fff;border-color:#23385f}
.kpi.hero .lbl{color:#c4d0e6}.kpi.hero .val{color:#fff}.kpi.hero .val small{color:#c1a869}
.dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
.panel{padding:18px 20px}
.panel h3{font-size:15px;font-weight:800;margin-bottom:2px}
.panel .cap{font-size:12px;color:var(--muted);font-weight:500;margin-bottom:14px}
.hbar{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
.hbar .nm{width:130px;font-weight:600;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{flex:1;height:9px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.hbar .fill{height:100%;background:linear-gradient(90deg,var(--brass),#cba15a);border-radius:6px}
.hbar .vv{width:64px;text-align:left;font-weight:700;font-variant-numeric:tabular-nums;font-size:12.5px}
.recent{display:flex;flex-direction:column}
.recent .r{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--line-soft);cursor:pointer;border-radius:8px}
.recent .r:hover{background:#FCFBF8}
.recent .r:last-child{border-bottom:0}
.recent .r .dt{font-weight:700;font-size:13.5px}
.recent .r .wd{font-size:11.5px;color:var(--muted)}
.recent .r .amt{font-weight:800;font-variant-numeric:tabular-nums;font-size:14px}

/* ---------- reports list ---------- */
.filterbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;padding:12px 14px}
.field{position:relative}
.field>label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px}
.inp{border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--paper);color:var(--ink);font-weight:600}
.inp:focus{outline:2px solid var(--brass);outline-offset:-1px;background:#fff}
.datebtn{min-width:150px;text-align:right;display:flex;justify-content:space-between;gap:10px;align-items:center}
.rtable{width:100%;border-collapse:collapse;overflow:hidden}
.rtable th{background:var(--paper);font-size:12px;font-weight:700;color:var(--ink-soft);padding:13px 14px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
.rtable td{padding:13px 14px;border-bottom:1px solid var(--line-soft);font-size:13.5px;text-align:right}
.rtable tbody tr{cursor:pointer}
.rtable tbody tr:hover{background:#FCFBF8}
.rtable td.n{font-variant-numeric:tabular-nums;font-weight:700}

/* ---------- editor ---------- */
.rhead{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:14px;position:relative;overflow:hidden}
.rhead::before{content:"";position:absolute;inset-inline-start:0;top:0;bottom:0;width:5px;background:var(--brass)}
.rhead .title{font-size:19px;font-weight:800}
.rhead .meta{display:flex;gap:22px;flex-wrap:wrap;align-items:center}
.rhead .meta .k{font-size:11px;color:var(--muted);font-weight:600}.rhead .meta .v{font-size:14px;font-weight:800}
.toolbar{display:flex;gap:8px;flex-wrap:wrap}
.editor-kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}
.grid{width:100%;border-collapse:collapse}
.grid th{background:var(--paper);font-size:11.5px;font-weight:700;color:var(--ink-soft);padding:10px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.grid th.br{text-align:right;padding-inline-start:18px}
.grid td{padding:6px;text-align:center;border-bottom:1px solid var(--line-soft);font-size:13px}
.grid td.br{text-align:right;padding-inline-start:18px;font-weight:700}
.grid tbody tr:hover{background:#FCFBF8}
.cell{width:74px;border:1px solid transparent;border-radius:7px;padding:5px 3px;text-align:center;font-size:13px;font-weight:600;background:transparent;color:var(--ink);font-variant-numeric:tabular-nums}
.cell:hover{border-color:var(--line);background:#fff}
.cell:focus{outline:none;border-color:var(--brass);background:#fff;box-shadow:0 0 0 3px var(--brass-tint)}
.cell:disabled{background:transparent;color:var(--ink)}
.calc{font-weight:800;background:#FCFBF8;border-radius:6px}
.grid tfoot td{padding:12px 6px;font-weight:800;font-size:13.5px;border-top:2px solid var(--ink);background:var(--paper)}
.grid tfoot td.br{text-align:right;padding-inline-start:18px}
.brname{width:150px;border:1px solid transparent;border-radius:7px;padding:5px 8px;font-weight:700;font-size:13px;background:transparent;color:var(--ink);text-align:right}
.brname:hover{border-color:var(--line);background:#fff}.brname:focus{outline:none;border-color:var(--brass);background:#fff}
.rowdel{color:var(--muted);border:0;background:transparent;font-weight:800;padding:3px 7px;border-radius:6px}
.rowdel:hover{background:var(--clay-tint);color:var(--clay)}
.recon-toggle{cursor:pointer;user-select:none}
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.ledger{padding:6px 20px 16px}
.ledger .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px dashed var(--line)}
.ledger .row:last-child{border-bottom:0}
.ledger .lab{font-weight:700;font-size:14px;color:var(--ink-soft)}
.ledger .hint{font-size:11px;color:var(--muted);font-weight:500}
.ledger .amt{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}
.ledger .row.result{background:linear-gradient(160deg,#1b2e51,#25457a);color:#fff;margin:8px -20px -16px;padding:16px 20px;border-radius:0 0 16px 16px}
.ledger .row.result .lab{color:#c4d0e6}.ledger .row.result .amt{color:#fff;font-size:20px}
.ledger .row.result .amt::after{content:" ﷼";color:#c1a869;font-size:13px}
.dep-inp{width:120px;border:1px solid var(--line);border-radius:8px;padding:5px;text-align:center;font-weight:700;font-variant-numeric:tabular-nums;background:var(--paper)}
.dep-inp:focus{outline:none;border-color:var(--brass);background:#fff}
.rule-note{font-size:12px;color:var(--brass-deep);background:var(--brass-tint);border:1px solid #ECD9A6;border-radius:10px;padding:9px 13px;margin:14px 20px 0;font-weight:600}
.lines{padding:6px 20px 10px}
.line{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line-soft)}
.line:last-child{border-bottom:0}
.lamt{width:96px;font-weight:800;font-variant-numeric:tabular-nums;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:6px}
.lamt:focus{outline:none;border-color:var(--brass);background:#fff}
.ldet{border:1px solid transparent;border-radius:8px;padding:6px 8px;font-size:13px;color:var(--ink-soft);font-weight:500;background:transparent}
.ldet:hover{border-color:var(--line);background:#fff}.ldet:focus{outline:none;border-color:var(--brass);background:#fff}
.subtotal{display:flex;justify-content:space-between;padding:13px 20px;margin-top:2px;border-top:2px solid var(--line);font-weight:800;font-size:15px;background:var(--paper);border-radius:0 0 16px 16px}

/* ---------- import center ---------- */
.drop{border:2px dashed #d6cfbe;border-radius:16px;padding:40px 20px;text-align:center;background:#fbfaf6;transition:.15s}
.drop:hover{border-color:var(--brass);background:var(--brass-tint)}
.drop .big{font-size:40px;margin-bottom:8px}
.imp-opt{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
.imp-opt .o{padding:16px;text-align:center;cursor:pointer}
.imp-opt .o:hover{border-color:var(--brass)}
.imp-opt .o .i{font-size:22px;margin-bottom:6px}
.imp-opt .o .t{font-weight:700;font-size:13.5px}
.imp-opt .o .d{font-size:11.5px;color:var(--muted)}

/* ---------- branches / settings ---------- */
.brlist .b{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line-soft)}
.brlist .b:last-child{border-bottom:0}
.brlist .b .h{color:var(--muted);cursor:grab;font-size:15px}
.brlist .b .nm{flex:1;font-weight:700}
.switch{position:relative;width:42px;height:24px;border-radius:20px;background:#d5d0c4;transition:.15s;cursor:pointer;border:0}
.switch.on{background:var(--teal)}
.switch::after{content:"";position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
.switch.on::after{right:21px}
.setgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.setrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line-soft)}
.setrow:last-child{border-bottom:0}
.setrow .k{font-weight:700;font-size:13.5px}.setrow .k small{display:block;color:var(--muted);font-weight:500;font-size:11.5px}

/* ---------- calendar popover ---------- */
.cal-pop{position:absolute;z-index:60;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:14px;width:290px;top:calc(100% + 6px);inset-inline-start:0}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head .mid{display:flex;gap:6px;align-items:center}
.cal-head select{border:1px solid var(--line);border-radius:8px;padding:5px 8px;font-weight:700;font-size:13px}
.cal-nav{border:1px solid var(--line);background:#fff;width:30px;height:30px;border-radius:8px;font-weight:800;color:var(--ink-soft)}
.cal-nav:hover{border-color:var(--brass);color:var(--brass-deep)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-grid .dow{font-size:10.5px;color:var(--muted);font-weight:700;text-align:center;padding:4px 0}
.cal-cell{aspect-ratio:1;border:0;background:transparent;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.cal-cell:hover{background:var(--brass-tint)}
.cal-cell.dim{color:#c9c3b5}
.cal-cell.today{box-shadow:inset 0 0 0 1px var(--brass)}
.cal-cell.sel{background:var(--ink);color:#fff}
.cal-cell.inrange{background:var(--blue-tint)}
.cal-foot{display:flex;justify-content:space-between;margin-top:10px;gap:8px}

/* ---------- toast / modal ---------- */
.toast{position:fixed;bottom:22px;inset-inline-start:22px;background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-weight:600;font-size:13.5px;box-shadow:var(--shadow);z-index:200;display:flex;gap:10px;align-items:center;animation:up .25s}
@keyframes up{from{transform:translateY(10px);opacity:0}}
.overlay{position:fixed;inset:0;background:rgba(24,42,70,.42);display:grid;place-items:center;z-index:150;padding:20px}
.modal{background:#fff;border-radius:16px;box-shadow:var(--shadow);max-width:460px;width:100%;padding:22px 24px}
.modal h3{font-size:17px;font-weight:800;margin-bottom:8px;display:flex;gap:9px;align-items:center}
.modal p{font-size:13.5px;color:var(--ink-soft);line-height:1.7;margin-bottom:16px}
.modal .acts{display:flex;gap:10px;justify-content:flex-start}

/* history drawer */
.hist .h{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft);font-size:13px}
.hist .h .dot{width:9px;height:9px;border-radius:50%;background:var(--brass);margin-top:5px;flex:none}
.hist .h .t{font-weight:700}.hist .h .m{color:var(--muted);font-size:12px}

@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;top:0;inset-inline-end:0;height:100vh;width:270px;z-index:130;
    box-shadow:-14px 0 40px rgba(24,42,70,.28);transform:translateX(0)}
  html[dir="rtl"] body.nav-collapsed .side{transform:translateX(105%)}
  body.nav-collapsed .side{transform:translateX(105%)}
  body:not(.nav-collapsed) .backdrop{display:block}
  .dash-grid,.two,.setgrid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}
  .editor-kpis{grid-template-columns:repeat(2,1fr)}.imp-opt{grid-template-columns:repeat(2,1fr)}
  .main{padding:18px 16px 60px}.pagehead h2{font-size:19px}
}
@media(max-width:560px){.kpis,.editor-kpis,.imp-opt{grid-template-columns:1fr}.filterbar{flex-direction:column;align-items:stretch}
  .field,.csel{width:100%}.rhead .meta{gap:14px}}

/* ---------- custom dropdown (csel) ---------- */
.csel{position:relative;display:inline-block}
.csel-btn{display:inline-flex;align-items:center;justify-content:space-between;gap:10px;min-width:150px;
  border:1px solid var(--line);background:var(--paper);color:var(--ink);font-weight:700;font-size:13px;
  padding:9px 13px;border-radius:11px;transition:.12s;width:100%}
.csel-btn:hover{border-color:#d3c7a4;background:#fff}
.csel.open .csel-btn{border-color:var(--brass);background:#fff;box-shadow:0 0 0 3px var(--brass-tint)}
.csel-caret{color:var(--muted);font-size:11px;transition:transform .18s}
.csel.open .csel-caret{transform:rotate(180deg);color:var(--brass-deep)}
.csel-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* build branches + reports (inputs only) from imported model */
(function init(){
  const seen={}; let ord=1;
  DATA.days.forEach(d=>d.branches.forEach(b=>{if(!(b.branch in seen)){seen[b.branch]={id:'br_'+ord,name:b.branch,active:true,order:ord};ord++;}}));
  state.branches=Object.values(seen);
  const bid=nm=>seen[nm]?seen[nm].id:'br_?';
  DATA.days.forEach(d=>{
    const primary=d.branches[0]?d.branches[0].branch:'—';
    state.reports.push({
      id:'rpt_'+d.date+'_'+bid(primary),date:d.date,serial:d.serial,weekday:d.weekday,
      branch_id:bid(primary),branch_name:primary,status:'completed',
      sales:d.branches.map((b,i)=>({row_id:'row'+i,branch_id:bid(b.branch),branch_name:b.branch,
        total:b.total,card:b.card,deferred:b.deferred||0,deposit_refund:b.deposit_refund||0,
        transfer:b.transfer||0,tabby:b.tabby||0,tamara:b.tamara||0,notes:b.notes||'',

/* ---------- accounting (single source of truth) ---------- */
function bcash(s){return s.total-(s.card+s.deferred+s.deposit_refund+s.transfer+s.tabby+s.tamara);}
function totals(r){
  const todays=r.sales.reduce((a,s)=>a+bcash(s),0);
  const noncash=r.sales.reduce((a,s)=>a+s.card+s.deferred+s.deposit_refund+s.transfer+s.tabby+s.tamara,0);
  const totalSales=r.sales.reduce((a,s)=>a+s.total,0);
  const exp=r.expenses.reduce((a,e)=>a+(+e.amount||0),0);
  const rev=r.revenue.reduce((a,e)=>a+(+e.amount||0),0);
  const net=todays-exp, final=net+rev;
  const remaining=r.treasury.previous_balance+todays-r.treasury.bank_deposit;
  return {totalSales,todays,noncash,exp,rev,net,final,remaining};
}
/* carry-forward: previous_balance = prior day's remaining (exactly like Excel, but consistent) */
function recomputeChain(){
  const sorted=[...state.reports].sort((a,b)=>a.date<b.date?-1:1);
  let prev=state.settings.opening_balance;
  sorted.forEach((r,i)=>{ r.treasury.previous_balance = (i===0)?state.settings.opening_balance:prev;
    prev = totals(r).remaining; });
}

/* ---------- custom dropdown component ---------- */
function csel(name,value,options,opts={}){
  const cur=options.find(o=>String(o.value)===String(value));
  const label=cur?cur.label:(opts.placeholder||'اختر…');
  return `<div class="csel" data-name="${name}" data-value="${value}" ${opts.style?`style="${opts.style}"`:''}>
    <button type="button" class="csel-btn"><span class="csel-label">${label}</span><span class="csel-caret">▾</span></button>
    <div class="csel-menu" hidden>${options.map(o=>`<button type="button" class="csel-opt ${String(o.value)===String(value)?'sel':''}" data-val="${o.value}">${o.label}</button>`).join('')}</div>
  </div>`;
}
const CSEL_HANDLERS={
  branchFilter:v=>{state.filter.branch=v;render();},
  calMonth:v=>{calState.m=+v;drawCal();},
  calYear:v=>{calState.y=+v;drawCal();},
};
function closeAllCsel(){document.querySelectorAll('.csel').forEach(c=>{c.classList.remove('open');const m=c.querySelector('.csel-menu');if(m)m.hidden=true;});}
document.addEventListener('click',e=>{
  const btn=e.target.closest('.csel-btn');
  const opt=e.target.closest('.csel-opt');
  if(btn){e.stopPropagation();const cs=btn.closest('.csel');const wasOpen=cs.classList.contains('open');closeAllCsel();
    if(!wasOpen){cs.classList.add('open');cs.querySelector('.csel-menu').hidden=false;}return;}
  if(opt){e.stopPropagation();const cs=opt.closest('.csel');const name=cs.dataset.name,val=opt.dataset.val;closeAllCsel();(CSEL_HANDLERS[name]||(()=>{}))(val);return;}
  closeAllCsel();
});

/* ---------- tiny SVG charts ---------- */
function lineChart(data,w,h){
  const pad=24,ys=data.map(d=>d.y),min=Math.min(...ys),max=Math.max(...ys),rng=(max-min)||1;
  const X=i=>pad+(i/(data.length-1||1))*(w-2*pad);
  const Y=v=>h-pad-((v-min)/rng)*(h-2*pad);
  const pts=data.map((d,i)=>`${X(i)},${Y(d.y)}`).join(' ');
  const area=`${pad},${h-pad} `+pts+` ${w-pad},${h-pad}`;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <polygon points="${area}" fill="rgba(176,141,63,.10)"/>
    <polyline points="${pts}" fill="none" stroke="var(--brass)" stroke-width="2.5" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${X(i)}" cy="${Y(d.y)}" r="3" fill="#fff" stroke="var(--brass)" stroke-width="2"/>`).join('')}
    ${data.map((d,i)=>i%2===0?`<text x="${X(i)}" y="${h-6}" font-size="9" fill="#8A93A6" text-anchor="middle">${d.x}</text>`:'').join('')}
  </svg>`;
}
function barChart(data,w,h){
  const pad=24,max=Math.max(...data.map(d=>Math.abs(d.y)))||1,zero=h-pad;
  const bw=(w-2*pad)/data.length*0.6, gap=(w-2*pad)/data.length;
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${zero}" x2="${w-pad}" y2="${zero}" stroke="#E6E2D8"/>
    ${data.map((d,i)=>{const bh=Math.abs(d.y)/max*(h-2*pad);const x=pad+i*gap+gap*0.2;
      const y=d.y>=0?zero-bh:zero;const col=d.y<0?'var(--clay)':'var(--ink-2)';
      return `<rect x="${x}" y="${y}" width="${bw}" height="${Math.max(1,bh)}" rx="3" fill="${col}" opacity=".9"/>
      <text x="${x+bw/2}" y="${h-6}" font-size="9" fill="#8A93A6" text-anchor="middle">${d.x}</text>`;}).join('')}
  </svg>`;
}

/* ---------- professional calendar ---------- */
let calState={y:2026,m:6,from:null,to:null,pick:'from'};
function openCalendar(anchor){
  closeCalendar();
  const f=state.filter; calState.from=f.from;calState.to=f.to;calState.pick='from';
  if(f.from){const d=new Date(f.from);calState.y=d.getFullYear();calState.m=d.getMonth();}
  const pop=document.createElement('div');pop.className='cal-pop';pop.id='calPop';
  anchor.parentElement.style.position='relative';anchor.parentElement.appendChild(pop);
  drawCal();
  setTimeout(()=>document.addEventListener('click',outside),0);
}
function outside(e){if(e.target&&e.target.isConnected===false)return;if(e.target.closest('.csel'))return;if(!e.target.closest('#calPop')&&!e.target.closest('#fDate'))closeCalendar();}
function closeCalendar(){const p=el('calPop');if(p)p.remove();document.removeEventListener('click',outside);}
function drawCal(){
  const p=el('calPop');if(!p)return;
  const y=calState.y,m=calState.m;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const years=[];for(let yy=2024;yy<=2027;yy++)years.push(yy);
  const iso=(yy,mm,dd)=>`${yy}-${String(mm+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  const inRange=d=>calState.from&&calState.to&&d>calState.from&&d<calState.to;
  let cells='';
  for(let i=0;i<first;i++)cells+=`<button class="cal-cell dim" disabled>${prevDays-first+i+1}</button>`;
  for(let d=1;d<=days;d++){const ds=iso(y,m,d);
    const sel=ds===calState.from||ds===calState.to;
    cells+=`<button class="cal-cell ${sel?'sel':''} ${inRange(ds)?'inrange':''}" data-d="${ds}">${d}</button>`;}
  p.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" data-cal="py">»</button>
      <div class="mid" style="display:flex;gap:6px">
        ${csel('calMonth',m,AR_MON.map((n,i)=>({value:i,label:n})),{style:'min-width:96px'})}
        ${csel('calYear',y,years.map(yy=>({value:yy,label:String(yy)})),{style:'min-width:78px'})}
      </div>
      <button class="cal-nav" data-cal="ny">«</button>
    </div>
    <div class="cal-grid">${['أحد','إثن','ثلا','أرب','خمي','جمع','سبت'].map(d=>`<div class="dow">${d}</div>`).join('')}${cells}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;text-align:center">${calState.pick==='from'?'اختر تاريخ البداية':'اختر تاريخ النهاية'}</div>
    <div class="cal-foot"><button class="btn sm" data-cal="clear">مسح</button><button class="btn sm pri" data-cal="apply">تطبيق</button></div>`;
  p.querySelectorAll('[data-d]').forEach(b=>b.addEventListener('click',()=>{
    const d=b.dataset.d;
    if(calState.pick==='from'){calState.from=d;calState.to=null;calState.pick='to';}
    else{if(d<calState.from){calState.to=calState.from;calState.from=d;}else calState.to=d;calState.pick='from';}
    drawCal();}));
  p.querySelector('[data-cal="py"]').addEventListener('click',()=>{calState.y--;drawCal();});
  p.querySelector('[data-cal="ny"]').addEventListener('click',()=>{calState.y++;drawCal();});
  p.querySelector('[data-cal="clear"]').addEventListener('click',()=>{state.filter.from=null;state.filter.to=null;closeCalendar();render();});
  p.querySelector('[data-cal="apply"]').addEventListener('click',()=>{state.filter.from=calState.from;state.filter.to=calState.to;closeCalendar();render();});
}

      <tfoot><tr><th>الاجماليات</th>${cols.map(c=>`<th>${F(c[0]==='cash'?t.todays:foot[c[0]])}</th>`).join('')}</tr></tfoot></table>
    <div class="p-sum">
      <div class="box"><b>الخزينة</b><br>رصيد سابق: ${F2(r.treasury.previous_balance)}<br>＋ نقد اليوم: ${F2(t.todays)}<br>− إيداع بنكي: ${F2(r.treasury.bank_deposit)}<br><b>باقي الرصيد: ${F2(t.remaining)} ﷼</b></div>
      <div class="box"><b>مطابقة النقد</b><br>نقد اليوم: ${F2(t.todays)}<br>− مصروفات: ${F2(t.exp)}<br>صافي النقد: ${F2(t.net)}<br>＋ إيرادات: ${F2(t.rev)}<br><b>الإجمالي النقدي: ${F2(t.final)} ﷼</b></div>
    </div>
    <div class="p-foot"><span>${state.settings.company}</span><span>نظام التقارير اليومية</span><span>صفحة ١ من ١</span></div>
  </div>`;
  window.print();
}

/* ---------- wiring ---------- */
function wire(){
  document.querySelectorAll('[data-open]').forEach(e=>e.addEventListener('click',()=>openReport(e.dataset.open)));
  const bind=(sel,fn)=>document.querySelectorAll(sel).forEach(e=>e.addEventListener('click',fn));
  const r=state.reports.find(x=>x.id===state.openId);

  // filters
  if(el('fSearch'))el('fSearch').addEventListener('input',e=>{state.filter.search=e.target.value.trim();
    const cur=e.target;render();const n=el('fSearch');if(n){n.focus();n.value=cur.value;n.setSelectionRange(cur.value.length,cur.value.length);}});
  if(el('fClear'))el('fClear').addEventListener('click',()=>{state.filter={branch:'',from:null,to:null,search:''};render();});
  if(el('fDate'))el('fDate').addEventListener('click',e=>{e.stopPropagation();if(el('calPop'))closeCalendar();else openCalendar(el('fDate'));});

  // editor actions
  bind('[data-act]',e=>{const a=e.currentTarget.dataset.act;
    if(a==='back')go('reports');
    else if(a==='new')modal(`<div class="modal"><h3>◆ تقرير جديد</h3><p>في نسخة المعاينة لا تُحفظ التقارير. عند النشر، سيفتح نموذج تقرير جديد مع ترحيل باقي الرصيد تلقائيًا من آخر يوم.</p><div class="acts"><button class="btn" onclick="closeModal()">حسنًا</button></div></div>`);
    else if(a==='toggleEdit'){if(state.editing){recomputeChain();toast('تم حفظ التغييرات (معاينة)');r.audit.unshift({at:new Date().toISOString().slice(0,16).replace('T',' '),user:'أنت',action:'تعديل التقرير'});}state.editing=!state.editing;render();}
    else if(a==='print')printReport(r);
    else if(a==='duplicate')modal(`<div class="modal"><h3>⧉ نسخ التقرير</h3><p>سيُنشأ تقرير جديد بنفس التاريخ والفرع بهوية مستقلة (يدعم أكثر من تقرير لنفس الفرع في نفس اليوم) — تمامًا كما طلبت بدل تكرار أوراق الإكسل.</p><div class="acts"><button class="btn pri" onclick="closeModal();toast('تم إنشاء نسخة (معاينة)')">إنشاء نسخة</button><button class="btn" onclick="closeModal()">إلغاء</button></div></div>`);
    else if(a==='export')exportReport(r);
    else if(a==='history')showHistory(r);
    else if(a==='addRow'){r.sales.push({row_id:'row'+Date.now(),branch_id:'',branch_name:'فرع جديد',total:0,card:0,deferred:0,deposit_refund:0,transfer:0,tabby:0,tamara:0,notes:'',recon:'verified'});render();}
    else if(a==='addExp'){r.expenses.push({id:'e'+Date.now(),amount:0,details:''});render();}
    else if(a==='addRev'){r.revenue.push({id:'r'+Date.now(),amount:0,details:''});render();}
    else if(a==='addBranch'){state.branches.push({id:'br_'+Date.now(),name:'فرع جديد',active:true,order:state.branches.length+1});render();}
    else if(a==='addPayment'){state.payments.push({id:'pm_'+Date.now(),name:'طريقة دفع جديدة',key:'custom',active:true,order:state.payments.length+1});render();}
    else if(a==='simDup')simulateDuplicate();
    else if(a==='connectDbx')modal(`<div class="modal"><h3>⇪ ربط Dropbox</h3><p>هنا ستربط حسابك عند النشر النهائي. الخطوة الوحيدة اليدوية: إنشاء "مفتاح تطبيق" مجاني من لوحة مطوّري Dropbox (دقيقتان) — وسأرشدك خطوة بخطوة حينها. بعدها يعمل تسجيل الدخول والمزامنة والنسخ الاحتياطي تلقائيًا.</p><div class="acts"><button class="btn" onclick="closeModal()">حسنًا</button></div></div>`);
  });

  // cell edits
  document.querySelectorAll('.cell,.brname').forEach(inp=>inp.addEventListener('input',e=>{
    const i=+e.target.dataset.i,k=e.target.dataset.k;
    if(k==='branch_name')r.sales[i][k]=e.target.value; else r.sales[i][k]=parseFloat(e.target.value)||0;
    // live update only the affected derived cells without full re-render (keep focus)
    liveEditorUpdate(r);
  }));
  document.querySelectorAll('.dep-inp').forEach(inp=>inp.addEventListener('input',e=>{r.treasury.bank_deposit=parseFloat(e.target.value)||0;liveEditorUpdate(r);}));
  document.querySelectorAll('.lamt,.ldet').forEach(inp=>inp.addEventListener('input',e=>{
    const kind=e.target.dataset.line,i=+e.target.dataset.i,k=e.target.dataset.k;
    const arr=kind==='exp'?r.expenses:r.revenue;
    arr[i][k]=k==='amount'?(parseFloat(e.target.value)||0):e.target.value;liveEditorUpdate(r);}));
  bind('[data-del]',e=>{r.sales.splice(+e.currentTarget.dataset.del,1);render();});
  bind('[data-linedel]',e=>{const[k,i]=e.currentTarget.dataset.linedel.split(':');(k==='exp'?r.expenses:r.revenue).splice(+i,1);render();});
  bind('.recon-toggle',e=>{const i=+e.currentTarget.dataset.i;r.sales[i].recon=reconNext(r.sales[i].recon);
    e.currentTarget.className='chip recon-toggle '+r.sales[i].recon;e.currentTarget.innerHTML='<span class="d"></span>'+reconLbl(r.sales[i].recon);});

  // branches + payments
  bind('[data-branch]',e=>{const b=state.branches.find(x=>x.id===e.currentTarget.dataset.branch);b.active=!b.active;render();});
  bind('[data-payment]',e=>{const p=state.payments.find(x=>x.id===e.currentTarget.dataset.payment);p.active=!p.active;render();});

  // import options
  bind('[data-imp]',()=>simulateDuplicate());
}

/* live recompute inside editor without losing input focus */
function liveEditorUpdate(r){
  const t=totals(r);
  // row cash cells + delete-aware: recompute each row's calc cell
  document.querySelectorAll('.grid tbody tr').forEach(tr=>{
    const i=+tr.dataset.i;if(isNaN(i)||!r.sales[i])return;
    const cv=bcash(r.sales[i]);const cell=tr.querySelector('td.calc');if(cell){cell.textContent=F(cv);cell.classList.toggle('neg',cv<0);}
  });
  // footer
  const foot={};['total','card','deferred','deposit_refund','transfer','tabby','tamara'].forEach(k=>foot[k]=r.sales.reduce((a,s)=>a+(+s[k]||0),0));
  const footCash=r.sales.reduce((a,s)=>a+bcash(s),0);
  const ftds=document.querySelectorAll('.grid tfoot td');
  if(ftds.length){const order=['total','card','cash','deferred','deposit_refund','transfer','tabby','tamara'];
    order.forEach((k,idx)=>{const td=ftds[idx+1];if(td)td.textContent=F(k==='cash'?footCash:foot[k]);});}
  // editor KPIs
  const vals=document.querySelectorAll('.editor-kpis .kpi .val');
  if(vals.length>=5){vals[0].innerHTML=F(t.todays)+'<small>﷼</small>';vals[1].innerHTML=F(t.exp)+'<small>﷼</small>';
    vals[2].innerHTML=F(t.net)+'<small>﷼</small>';vals[3].innerHTML=F(t.final)+'<small>﷼</small>';vals[4].innerHTML=F2(t.remaining)+'<small>﷼</small>';}
  // ledgers
  document.querySelectorAll('.ledger .amt').forEach(a=>{});
  const led=document.querySelectorAll('.ledger');
  if(led[0]){const rows=led[0].querySelectorAll('.row .amt');
    rows[0].textContent=F2(r.treasury.previous_balance);rows[1].textContent=F2(t.todays);
    if(!state.editing)rows[2].textContent=F2(r.treasury.bank_deposit);rows[3].textContent=F2(t.remaining);}
  if(led[1]){const rows=led[1].querySelectorAll('.row .amt');
    rows[0].textContent=F2(t.todays);rows[1].textContent=F2(t.exp);rows[2].textContent=F2(t.net);rows[2].classList.toggle('neg',t.net<0);
    rows[3].textContent=F2(t.rev);rows[4].textContent=F2(t.final);}
  document.querySelectorAll('.subtotal .num').forEach((s,i)=>{s.textContent=(i===0?F2(t.exp):F2(t.final))+' ﷼';});
}

function showHistory(r){
  modal(`<div class="modal"><h3>🕑 سجل التعديلات</h3><div class="hist">
    ${r.audit.map(h=>`<div class="h"><span class="dot"></span><div><div class="t">${h.action}</div><div class="m">${h.user} • ${h.at}</div></div></div>`).join('')}
  </div><div class="acts" style="margin-top:14px"><button class="btn" onclick="closeModal()">إغلاق</button></div></div>`);
}
function exportReport(r){
  const t=totals(r);const cols=['الفرع','اجمالي المبيعات','الشبكة','النقد','آجل','مرتجع عربون','تحويل','تابي','تمارا'];
  let csv='\ufeff'+cols.join(',')+'\n';
  r.sales.forEach(s=>{csv+=[s.branch_name,s.total,s.card,bcash(s),s.deferred,s.deposit_refund,s.transfer,s.tabby,s.tamara].join(',')+'\n';});
  csv+=['الاجماليات',t.totalSales,'',t.todays,'','','','',''].join(',')+'\n\n';
  csv+=['رصيد سابق',r.treasury.previous_balance].join(',')+'\n'+['نقد اليوم',t.todays].join(',')+'\n'+['إيداع بنكي',r.treasury.bank_deposit].join(',')+'\n'+['باقي الرصيد',t.remaining].join(',')+'\n';
  csv+=['اجمالي المصروفات',t.exp].join(',')+'\n'+['صافي النقد',t.net].join(',')+'\n'+['الإيرادات',t.rev].join(',')+'\n'+['الإجمالي النقدي',t.final].join(',')+'\n';
  try{const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`تقرير_${r.date}.csv`;a.click();URL.revokeObjectURL(url);toast('تم تصدير الملف');}
  catch(e){toast('التصدير متاح عند فتح الملف مباشرة');}
}
function simulateDuplicate(){
  modal(`<div class="modal"><h3 style="color:var(--clay)">⚠ ملف مكرر</h3>
    <p>الملف <b>${DATA.source_file}</b> مستورد مسبقًا (نفس البصمة الرقمية <span class="num">${DATA.sha256.slice(0,12)}…</span>). استيراده مجددًا قد يُنشئ سجلات مكررة.</p>
    <div class="acts"><button class="btn pri" onclick="closeModal()">إلغاء الاستيراد</button><button class="btn" onclick="closeModal();toast('يتطلب تأكيدًا صريحًا')">استيراد مع التأكيد</button></div></div>`);
}

/* ---------- shell: drawer + PWA ---------- */
if(window.innerWidth<=1000)document.body.classList.add('nav-collapsed');
el('navToggle').addEventListener('click',()=>document.body.classList.toggle('nav-collapsed'));
el('backdrop').addEventListener('click',()=>document.body.classList.add('nav-collapsed'));
window.addEventListener('resize',()=>{if(window.innerWidth>1000)document.body.classList.remove('nav-collapsed');});

const isStandalone=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=el('installBtn');if(b&&!isStandalone)b.hidden=false;});
window.addEventListener('appinstalled',()=>{const b=el('installBtn');if(b)b.hidden=true;deferredPrompt=null;toast('تم تثبيت التطبيق');});
el('installBtn').addEventListener('click',async()=>{
  if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;el('installBtn').hidden=true;}
  else{modal(`<div class="modal"><h3>⇩ تثبيت التطبيق</h3>
    <p>على آيفون/آيباد: افتح قائمة المشاركة في المتصفح ثم اختر <b>«إضافة إلى الشاشة الرئيسية»</b>.<br>
    على أندرويد وويندوز وماك: افتح قائمة المتصفح ثم <b>«تثبيت التطبيق»</b>. سيُفتح النظام كتطبيق مستقل بملء الشاشة.</p>
    <div class="acts"><button class="btn" onclick="closeModal()">حسنًا</button></div></div>`);}
});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}

render();
</script>
