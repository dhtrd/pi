<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الجرد متعدد المستخدمين | شركة الضبيبي التجارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy900:#142440;--navy700:#1F3864;--navy500:#33589A;--navy100:#E8EEF9;
  --page:#F9F9F7;--card:#FFFFFF;--tprimary:#0B0B0B;--tsec:#52514E;--tmuted:#898781;
  --border:#C3C2B7;--hair:#ECEBE5;--success:#0CA30C;--warn:#FAB219;--danger:#D03B3B;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,Arial,sans-serif;background:var(--page);color:var(--tprimary);min-height:100vh;line-height:1.6}
.center{display:flex;align-items:center;justify-content:center;padding:20px;min-height:100vh}
.wrap{width:100%;max-width:420px}
.brand{text-align:center;margin-bottom:22px}
.brand .mark{display:inline-grid;place-items:center;width:56px;height:56px;border-radius:14px;background:var(--navy700);color:#fff;font-size:26px;font-weight:700;margin-bottom:10px}
.brand h1{font-size:20px;font-weight:700;color:var(--navy900)}
.brand p{color:var(--tsec);font-size:14px}
.card{background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:24px;box-shadow:0 6px 24px rgba(20,36,64,.06);margin-bottom:18px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--tsec);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;font-size:15px;background:#fff;color:var(--tprimary)}
.field input:focus,.field select:focus{outline:2px solid var(--navy700);outline-offset:1px;border-color:var(--navy700)}
.btn{padding:12px 18px;border:none;border-radius:var(--radius);background:var(--navy700);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:filter .12s}
.btn:hover{filter:brightness(1.08)}.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.block{width:100%}.btn.ghost{background:#fff;color:var(--navy700);border:1px solid var(--border)}.btn.sm{padding:7px 12px;font-size:13px}
.status{margin-top:14px;padding:11px 14px;border-radius:var(--radius);font-size:13.5px;font-weight:500;display:none}
.status.show{display:block}.status.ok{background:rgba(12,163,12,.12);color:var(--success)}.status.err{background:rgba(208,59,59,.12);color:var(--danger)}.status.info{background:var(--navy100);color:var(--navy500)}
.hint{margin-top:16px;font-size:12.5px;color:var(--tmuted);text-align:center;line-height:1.7}
.linklike{display:block;margin:14px auto 0;background:none;border:none;color:var(--navy500);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:underline}
.linklike:hover{color:var(--navy700)}
.diag{margin-top:12px;font-size:11px;color:var(--tmuted);text-align:center;font-family:monospace;direction:ltr}
.spin{display:inline-block;width:14px;height:14px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px;margin-left:6px}
@keyframes s{to{transform:rotate(360deg)}}
.appbar{background:var(--navy700);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.appbar .logo{font-weight:700;display:flex;align-items:center;gap:8px}
.appbar .logo .m{background:#fff;color:var(--navy700);width:30px;height:30px;border-radius:7px;display:grid;place-items:center;font-weight:700}
.appbar .sp{flex:1}
.appbar .who{font-size:13px;opacity:.95;text-align:left}
.appbar .who .r{background:rgba(255,255,255,.16);padding:2px 8px;border-radius:20px;font-size:11px}
.appbar button.out{background:rgba(255,255,255,.16);color:#fff;border:none;padding:7px 12px;border-radius:7px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
.nav{background:#fff;border-bottom:1px solid var(--hair);display:flex;gap:0;padding:0 12px;overflow-x:auto}
.nav button{padding:13px 16px;border:none;background:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--tmuted);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.nav button.on{color:var(--navy700);border-bottom-color:var(--navy700)}
.container{max-width:860px;margin:0 auto;padding:20px 16px 60px}
h2{font-size:18px;font-weight:700;margin-bottom:14px;color:var(--navy900)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--hair)}
th{background:var(--navy100);color:var(--navy900);font-weight:600}
.tag{padding:2px 10px;border-radius:20px;font-size:11.5px;font-weight:600;background:var(--navy100);color:var(--navy700)}
.tag.off{background:rgba(208,59,59,.12);color:var(--danger)}
.tag.open{background:rgba(12,163,12,.12);color:var(--success)}
.muted{color:var(--tmuted);font-size:12.5px}
.sess{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px;border:1px solid var(--hair);border-radius:12px;margin-bottom:10px}
.sess .info{flex:1;min-width:180px}
.sess .nm{font-weight:600}
/* ===== تقرير الفروقات (المرحلة 5) ===== */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:4px}
.tile{background:var(--card);border:1px solid var(--hair);border-radius:12px;padding:13px 15px}
.tile.hl{background:var(--navy100);border-color:var(--navy100)}
.tile.val{background:var(--navy900);border-color:var(--navy900)}
.tile.val .k{color:rgba(255,255,255,.75)}.tile.val .v{color:#fff}
.tile .k{font-size:12px;color:var(--tsec);margin-bottom:4px}
.tile .v{font-size:19px;font-weight:700;color:var(--navy900)}
.tile .v.pos{color:var(--success)}.tile .v.neg{color:var(--danger)}
.tile.clk{cursor:pointer;transition:transform .08s,box-shadow .12s,outline-color .12s;outline:2px solid transparent;outline-offset:-1px}
.tile.clk:hover{box-shadow:0 4px 14px rgba(20,36,64,.14);transform:translateY(-1px)}
.tile.clk.active{outline-color:var(--navy700);background:var(--navy100);border-color:var(--navy100)}
.rtools{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0 12px}
.rtools input,.rtools select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;background:#fff;color:var(--tprimary)}
.rtools input{flex:1;min-width:150px}
.rtable-wrap{overflow:auto;border:1px solid var(--hair);border-radius:12px;max-height:70vh}
.rtable-wrap table{border-collapse:separate;border-spacing:0}
.rtable-wrap th{position:sticky;top:0;z-index:2;box-shadow:inset 0 -1px 0 var(--border)}
.rtable-wrap tbody tr:nth-child(even){background:#FBFBF9}
.rtable-wrap tbody tr:hover{background:var(--navy100)}
.rtable-wrap tbody td{border-bottom:1px solid var(--hair)}
td.num,th.num{text-align:center;font-variant-numeric:tabular-nums}
.rtable-wrap tfoot td{position:sticky;bottom:0;background:var(--navy100);color:var(--navy900);font-weight:700;border-top:2px solid var(--navy500);z-index:2}
.st{padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;white-space:nowrap;display:inline-block}
.st.deficit{background:rgba(208,59,59,.12);color:var(--danger)}
.st.surplus{background:rgba(51,88,154,.14);color:var(--navy500)}
.st.match{background:rgba(12,163,12,.12);color:var(--success)}
.st.uncounted{background:rgba(250,178,25,.16);color:#8a5d00}
.st.nobook{background:var(--hair);color:var(--tsec)}
.dpos{color:var(--success);font-weight:700}.dneg{color:var(--danger);font-weight:700}
.print-only{display:none}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
@media print{
  .appbar,.nav{display:none!important}
  #repHeadBar,.rtools,#repNote{display:none!important}
  .print-only{display:block!important}
  body{background:#fff}
  .container{padding:0;max-width:100%}
  .reportcard{border:none!important;box-shadow:none!important;padding:0!important;margin:0!important}
  .rtable-wrap{max-height:none!important;overflow:visible!important;border:1px solid #bbb!important}
  .rtable-wrap th{position:static!important;box-shadow:none!important}
  .rtable-wrap tfoot td{position:static!important}
  .tiles{grid-template-columns:repeat(3,1fr)!important}
  .tile{break-inside:avoid;border:1px solid #ddd!important}
  .tile.val{background:#1F3864!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{font-size:10.5px}
  th,td{padding:5px 7px!important}
  thead{display:table-header-group}
  tr{break-inside:avoid}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="center" id="loginView">
  <div class="wrap">
    <div class="brand"><div class="mark">ج</div><h1>نظام الجرد متعدد المستخدمين</h1><p>شركة الضبيبي التجارية</p></div>
    <div class="card">
      <form id="loginForm">
        <div class="field"><label for="email">البريد الإلكتروني</label><input type="email" id="email" autocomplete="username" placeholder="name@dhtrd.com" required></div>
        <div class="field"><label for="password">كلمة المرور</label><input type="password" id="password" autocomplete="current-password" placeholder="كلمة المرور" required></div>
        <button type="submit" class="btn block" id="loginBtn">دخول</button>
      </form>
      <div class="status" id="loginStatus"></div>
      <button type="button" class="linklike" id="forgotBtn">نسيت كلمة المرور؟</button>
      <div class="hint">إن لم يكن لديك حساب، تواصل مع مدير النظام لإنشائه لك بكلمة مرور مؤقتة.</div>
      <div class="diag" id="diag"></div>
    </div>
  </div>
</div>

<!-- FORCE CHANGE PASSWORD -->
<div class="center" id="changePwView" style="display:none">
  <div class="wrap">
    <div class="brand"><div class="mark">ج</div><h1>تعيين كلمة مرور جديدة</h1><p>لأول دخول، اختر كلمة مرور خاصة بك</p></div>
    <div class="card">
      <form id="pwForm">
        <div class="field"><label for="newPw">كلمة المرور الجديدة</label><input type="password" id="newPw" autocomplete="new-password" placeholder="٦ أحرف على الأقل" required></div>
        <div class="field"><label for="newPw2">تأكيد كلمة المرور</label><input type="password" id="newPw2" autocomplete="new-password" placeholder="أعد كتابتها" required></div>
        <button type="submit" class="btn block" id="pwBtn">حفظ والمتابعة</button>
      </form>
      <div class="status" id="pwStatus"></div>
      <button class="btn ghost block" id="pwLogout" style="margin-top:12px">تسجيل الخروج</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appView" style="display:none">
  <div class="appbar">
    <div class="logo"><span class="m">ج</span><span>نظام الجرد</span></div>
    <div class="sp"></div>
    <div class="who"><span id="whoEmail"></span> <span class="r" id="whoRole"></span></div>
    <button class="out" id="logoutBtn">خروج</button>
  </div>
  <div class="nav" id="appNav" style="display:none"></div>
  <div class="container" id="appContent"></div>
</div>

<div id="mapModal" style="display:none;position:fixed;inset:0;background:rgba(20,36,64,.55);z-index:100;align-items:center;justify-content:center;padding:16px">
  <div class="card" style="max-width:460px;width:100%;max-height:90vh;overflow:auto;margin:0">
    <h2>مواءمة أعمدة الملف</h2>
    <p class="muted" id="mapCount"></p>
    <div id="mapFields" style="margin-top:8px"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn" id="mapConfirm">رفع الأصناف</button><button class="btn ghost" id="mapCancel">إلغاء</button></div>
    <div class="status" id="mapStatus"></div>
  </div>
</div>
<input type="file" id="fileInput" accept=".csv,.xlsx,.xls,.txt" hidden>

<div id="camOverlay" style="display:none;position:fixed;inset:0;background:#000;z-index:200;align-items:center;justify-content:center">
  <video id="camVideo" playsinline muted style="max-width:100%;max-height:76vh"></video>
  <div style="position:absolute;top:0;right:0;left:0;padding:16px;text-align:center;color:#fff;font-weight:600;background:linear-gradient(#000a,transparent)">وجّه الكاميرا نحو الباركود — كل مسحة تَعُدّ ١+ بصوت</div>
  <div id="camLast" style="position:absolute;bottom:92px;color:#fff;font-size:17px;font-weight:700;text-align:center;right:0;left:0;text-shadow:0 1px 4px #000"></div>
  <button id="camCloseBtn" class="btn" style="position:absolute;bottom:22px;background:#fff;color:#111">إغلاق الكاميرا</button>
</div>

<script type="module">
import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updatePassword, sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, deleteDoc, getDocs, collection, onSnapshot, serverTimestamp, query, orderBy, limit, writeBatch, runTransaction }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCZOx3P4DvrDkXqgCwhjTeJ3E3YLnDPIks",
  authDomain: "dhtrd-pi.firebaseapp.com",
  projectId: "dhtrd-pi",
  storageBucket: "dhtrd-pi.firebasestorage.app",
  messagingSenderId: "1029991049996",
  appId: "1:1029991049996:web:7d91d41b592af633ccb729"
};
const OWNER_EMAIL = "a2@dhtrd.com";
const ROLES = ["مدير", "مدير مخزون", "عدّاد", "مطّلع"];
const MGR = ["مدير","مدير مخزون"]; // من يدير جلسات الجرد
const STLABEL = {deficit:"عجز",surplus:"زيادة",match:"مطابق",uncounted:"غير معدود",nobook:"بلا رصيد دفتري"};

const $ = id => document.getElementById(id);
let app, auth, db, myProfile=null, adminTab='sessions', uploadSid=null, countsUnsub=null, actUnsub=null, curSid=null, curSess=null, curItems=[], curCounts={};
// حالة تقرير الفروقات (المرحلة 5)
let repItems=[], repCounts={}, repSess=null, repSid=null, repRows=[], repUnsub=null, repBackTo='home';
// حالة مسح الباركود (كاميرا + ماسح)
let scanMode=false, _actx=null, _camOn=false, _camStream=null, _lastScan='', _lastT=0;

try{ app=initializeApp(firebaseConfig); auth=getAuth(app); db=getFirestore(app); $('diag').textContent='firebase connected · '+firebaseConfig.projectId; }
catch(e){ st('loginStatus','err','تعذّرت التهيئة: '+e.message); }

function st(id,kind,msg,spin){const s=$(id);if(!s)return;s.className='status show '+kind;s.innerHTML=(spin?'<span class="spin"></span>':'')+msg;}
function hideSt(id){const s=$(id);if(s)s.className='status';}
function show(v){['loginView','changePwView','appView'].forEach(x=>$(x).style.display=(x===v?'':'none'));}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){if(n==null||isNaN(n))return '—';return Number(n).toLocaleString('en-US',{maximumFractionDigits:2});}
function numv(v){var n=parseFloat(String(v==null?'':v).replace(/[,٬\s]/g,'').replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)));return isNaN(n)?null:n;}
function errAr(code){const m={'auth/invalid-email':'البريد غير صحيح.','auth/user-not-found':'لا يوجد حساب بهذا البريد.','auth/wrong-password':'كلمة المرور غير صحيحة.','auth/invalid-credential':'بيانات الدخول غير صحيحة.','auth/email-already-in-use':'هذا البريد مسجّل مسبقاً.','auth/weak-password':'كلمة المرور ضعيفة (٦ أحرف على الأقل).','auth/too-many-requests':'محاولات كثيرة — انتظر قليلاً.','auth/network-request-failed':'تعذّر الاتصال بالإنترنت.','auth/requires-recent-login':'سجّل الدخول من جديد ثم غيّر كلمة المرور.','auth/operation-not-allowed':'فعّل Email/Password في Firebase.','permission-denied':'رُفض الوصول (تحقّق من قواعد Firestore).'};return m[code]||('خطأ: '+code);}

// ===== LOGIN =====
$('loginForm').onsubmit=async(e)=>{e.preventDefault();if(!auth)return;$('loginBtn').disabled=true;st('loginStatus','info','جارٍ تسجيل الدخول…',true);
  try{await signInWithEmailAndPassword(auth,$('email').value.trim(),$('password').value);}
  catch(err){st('loginStatus','err',errAr(err.code||err.message));$('loginBtn').disabled=false;}};
$('forgotBtn').onclick=async()=>{if(!auth)return;const email=$('email').value.trim();if(!email){st('loginStatus','info','اكتب بريدك في الحقل أعلاه، ثم اضغط «نسيت كلمة المرور؟».');return;}
  try{await sendPasswordResetEmail(auth,email);st('loginStatus','ok','إن كان البريد مسجّلاً، أرسلنا إليه رابط إعادة التعيين. تفقّد بريدك (وصندوق الرسائل المزعجة).');}catch(err){st('loginStatus','err',errAr(err.code||err.message));}};

// ===== AUTH STATE =====
onAuthStateChanged(auth, async(user)=>{
  if(!user){myProfile=null;show('loginView');$('loginBtn').disabled=false;hideSt('loginStatus');return;}
  try{
    const ref=doc(db,'users',user.uid); let snap=await getDoc(ref);
    if(!snap.exists()){
      if(user.email===OWNER_EMAIL){ await setDoc(ref,{email:user.email,name:'المدير',role:'مدير',active:true,mustChangePassword:false,createdAt:serverTimestamp(),createdBy:'bootstrap'}); snap=await getDoc(ref); }
      else{ st('loginStatus','err','حسابك بلا دور بعد — تواصل مع مدير النظام.'); await signOut(auth); return; }
    }
    myProfile={uid:user.uid,...snap.data()};
    if(myProfile.active===false){st('loginStatus','err','حسابك معطّل — تواصل مع مدير النظام.');await signOut(auth);return;}
    if(myProfile.mustChangePassword===true){show('changePwView');return;}
    enterApp();
  }catch(err){st('loginStatus','err',errAr(err.code||err.message));}
});

// ===== CHANGE PASSWORD =====
$('pwForm').onsubmit=async(e)=>{e.preventDefault();const p1=$('newPw').value,p2=$('newPw2').value;
  if(p1.length<6){st('pwStatus','err','كلمة المرور ٦ أحرف على الأقل.');return;}
  if(p1!==p2){st('pwStatus','err','الكلمتان غير متطابقتين.');return;}
  $('pwBtn').disabled=true;st('pwStatus','info','جارٍ الحفظ…',true);
  try{await updatePassword(auth.currentUser,p1);await updateDoc(doc(db,'users',auth.currentUser.uid),{mustChangePassword:false});myProfile.mustChangePassword=false;$('pwBtn').disabled=false;hideSt('pwStatus');$('newPw').value='';$('newPw2').value='';enterApp();}
  catch(err){st('pwStatus','err',errAr(err.code||err.message));$('pwBtn').disabled=false;}};
$('pwLogout').onclick=()=>signOut(auth);
$('logoutBtn').onclick=()=>signOut(auth);

// ===== APP ROUTER =====
function enterApp(){show('appView');$('whoEmail').textContent=myProfile.email;$('whoRole').textContent=myProfile.role;renderNav();route();}
function renderNav(){
  const nav=$('appNav');
  if(myProfile.role==='مدير'){ nav.innerHTML=navBtn('sessions','جلسات الجرد')+navBtn('users','المستخدمون'); nav.style.display=''; }
  else if(myProfile.role==='مدير مخزون'){ nav.innerHTML=navBtn('sessions','جلسات الجرد'); nav.style.display=''; }
  else{ nav.style.display='none'; }
  nav.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{adminTab=b.getAttribute('data-tab');renderNav();route();});
}
function navBtn(k,label){return '<button data-tab="'+k+'" class="'+(adminTab===k?'on':'')+'">'+label+'</button>';}
function route(){if(countsUnsub){countsUnsub();countsUnsub=null;}if(actUnsub){actUnsub();actUnsub=null;}if(repUnsub){repUnsub();repUnsub=null;}const c=$('appContent');
  if(MGR.includes(myProfile.role)){ if(myProfile.role==='مدير'&&adminTab==='users') renderUsers(c); else renderSessions(c); return; }
  renderRoleHome(c);
}

function renderRoleHome(c){
  if(myProfile.role==='عدّاد'){ renderCounterHome(c); return; }
  renderViewerHome(c); // مطّلع (وأي دور اطّلاعي آخر): تقارير الفروقات
}
function renderCounterHome(c){
  c.innerHTML='<div class="card"><h2>جلسات الجرد المتاحة</h2><div id="counterSess"><p class="muted">جارٍ التحميل…</p></div><button class="btn ghost sm" id="selfPw" style="margin-top:14px">تغيير كلمة المرور</button></div>';
  $('selfPw').onclick=()=>show('changePwView');

// ===== FILE PARSING (CSV / XLSX) =====
$('fileInput').onchange=function(){const f=this.files[0];if(f&&uploadSid)handleFile(f,uploadSid);};
function handleFile(file,sid){
  const name=file.name.toLowerCase();const reader=new FileReader();
  if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    if(typeof XLSX==='undefined'){alert('تعذّر قراءة Excel (لا اتصال بالمكتبة). صدّر بصيغة CSV.');return;}
    reader.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];ingest(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}),sid);}catch(err){alert('تعذّرت قراءة الملف: '+err.message);}};
    reader.readAsArrayBuffer(file);
  }else{ reader.onload=e=>ingest(parseCSV(e.target.result),sid); reader.readAsText(file,'UTF-8'); }
}
function parseCSV(text){text=text.replace(/^﻿/,'');const first=text.split('\n')[0];const delim=(first.split(';').length>first.split(',').length)?';':',';
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===delim){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}else if(ch==='\r'){}else cur+=ch;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);} return rows.filter(r=>r.some(x=>String(x).trim()!==''));
}
let pending=null;
function ingest(arr,sid){
  arr=arr.filter(r=>r&&r.length); if(arr.length<2){alert('الملف فارغ أو بلا صفوف بيانات.');return;}
  const headers=arr[0].map((h,i)=>String(h).trim()||('عمود'+(i+1)));
  const low=headers.map(x=>String(x).toLowerCase());
  const findX=(keys,ex)=>{for(const k of keys)for(let j=0;j<low.length;j++){if(ex!=null&&ex>=0&&j===ex)continue;if(low[j].indexOf(k)>=0)return j;}return -1;};
  const g={};
  g.code=findX(['باركود','barcode','رمز الصنف','رمز','sku','code','كود','مرجع','ref']);
  g.barcode=findX(['باركود','barcode','qr','ean','upc'],g.code);
  g.name=findX(['اسم','name','صنف','product','بيان','وصف']);
  g.unit=findX(['وحدة','unit','uom','قياس']);
  g.book=findX(['كمية في اليد','on hand','onhand','متاح','رصيد','كمية','qty','quantity','stock']);
  g.cost=findX(['تكلفة','cost','سعر','price','قيمة']);
  g.category=findX(['فئة','تصنيف','category','categ','مجموعة','group','قسم']);
  pending={sid,headers,rows:arr.slice(1)};
  showMapping(g);
}
function showMapping(g){
  const H=pending.headers;
  const opt=(sel)=>'<option value="-1"'+(sel<0?' selected':'')+'>— لا شيء —</option>'+H.map((h,i)=>'<option value="'+i+'"'+(i===sel?' selected':'')+'>'+esc(h)+'</option>').join('');
  const fld=(id,label,sel)=>'<div class="field"><label>'+label+'</label><select id="'+id+'">'+opt(sel)+'</select></div>';
  $('mapCount').textContent='عدد الصفوف في الملف: '+pending.rows.length;
  $('mapFields').innerHTML=fld('mf_code','كود الصنف (إلزامي)',g.code)+fld('mf_barcode','الباركود (للمسح — اختياري)',g.barcode)+fld('mf_name','اسم الصنف (إلزامي)',g.name)+fld('mf_category','الفئة / تصنيف المنتج (اختياري — للتقرير)',g.category)+fld('mf_unit','الوحدة (اختياري)',g.unit)+fld('mf_book','الرصيد الدفتري (اختياري)',g.book)+fld('mf_cost','التكلفة (اختياري — للتقرير)',g.cost);
  hideSt('mapStatus'); $('mapModal').style.display='flex';
  $('mapCancel').onclick=()=>{$('mapModal').style.display='none';pending=null;};
  $('mapConfirm').onclick=()=>{
    const gi=id=>parseInt($(id).value,10);
    const idx={code:gi('mf_code'),barcode:gi('mf_barcode'),name:gi('mf_name'),category:gi('mf_category'),unit:gi('mf_unit'),book:gi('mf_book'),cost:gi('mf_cost')};
    if(idx.code<0||idx.name<0){st('mapStatus','err','حدّد عمودَي الكود والاسم.');return;}
    const items=pending.rows.map(r=>({code:idx.code>=0?String(r[idx.code]!=null?r[idx.code]:'').trim():'',barcode:idx.barcode>=0?String(r[idx.barcode]!=null?r[idx.barcode]:'').trim():'',name:idx.name>=0?String(r[idx.name]!=null?r[idx.name]:'').trim():'',category:idx.category>=0?String(r[idx.category]!=null?r[idx.category]:'').trim():'',unit:idx.unit>=0?String(r[idx.unit]!=null?r[idx.unit]:'').trim():'',book:idx.book>=0?numv(r[idx.book]):null,cost:idx.cost>=0?numv(r[idx.cost]):null})).filter(x=>x.code||x.name);
    const sid=pending.sid; $('mapModal').style.display='none'; pending=null;
    storeSnapshot(sid,items);
  };
}
async function storeSnapshot(sid,items){
  try{
    const CH=400;const batch=writeBatch(db);let chunks=0;
    for(let i=0;i<items.length;i+=CH){ batch.set(doc(db,'sessions',sid,'snapshot','chunk_'+String(chunks).padStart(4,'0')),{items:items.slice(i,i+CH),from:i}); chunks++; }
    batch.update(doc(db,'sessions',sid),{itemCount:items.length,uploadedAt:serverTimestamp()});
    await batch.commit();
    alert('تم رفع '+items.length+' صنف بنجاح ✓');
  }catch(err){alert('تعذّر الرفع: '+errAr(err.code||err.message));}
}

// ===== BARCODE SCANNING (كاميرا + ماسح متصل، مع صوت بيب فعلي) =====
function ensureAudio(){ try{ if(!_actx)_actx=new (window.AudioContext||window.webkitAudioContext)(); if(_actx&&_actx.state==='suspended')_actx.resume(); }catch(e){} }
// بيب فعلي عبر Web Audio (نغمة صاعدة للنجاح، منخفضة للفشل) — صوت لا تنبيه نظام
function beep(ok){ try{ ensureAudio(); if(!_actx)return; const o=_actx.createOscillator(),g=_actx.createGain(); o.connect(g); g.connect(_actx.destination); o.type='sine'; o.frequency.value=ok?1040:247; g.gain.value=0.0001; const t=_actx.currentTime; g.gain.exponentialRampToValueAtTime(0.16,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+(ok?0.12:0.30)); o.start(t); o.stop(t+(ok?0.13:0.32)); }catch(e){} }
function vibrate(ms){ try{ navigator.vibrate&&navigator.vibrate(ms||40); }catch(e){} }
function scanFeedback(msg,ok){ const el=$('scanStatus'); if(el){ el.style.display='block'; el.textContent=msg; el.style.background=ok?'rgba(12,163,12,.15)':'rgba(208,59,59,.15)'; el.style.color=ok?'var(--success)':'var(--danger)'; clearTimeout(el._t); el._t=setTimeout(()=>{if($('scanStatus'))$('scanStatus').style.display='none';},3000); } const cl=$('camLast'); if(cl)cl.textContent=msg; }
function findByScan(code){ code=String(code||'').trim(); if(!code)return null; return curItems.find(x=>String(x.code)===code||(x.barcode&&String(x.barcode)===code))||null; }
// كل مسحة: عثور على الصنف بالكود أو الباركود ← عدّ ١+ (تراكمي + سجل حركة) ← صوت
function handleScanCode(code){ code=String(code||'').trim(); if(!code)return; const it=findByScan(code); if(!it){ scanFeedback('✕ باركود غير موجود في هذه الجلسة: '+code, false); beep(false); vibrate(160); return; } const optimistic=((curCounts[it.code]&&curCounts[it.code].qty)||0)+1; scanFeedback('✓ '+it.name+' — عُدّ ١+ (الإجمالي ≈ '+fmt(optimistic)+')', true); beep(true); vibrate(45); addEntry(it.code,1); }
function toggleScanMode(){ scanMode=!scanMode; ensureAudio(); const b=$('scanModeBtn'),s=$('csearch'); if(b){ b.style.background=scanMode?'var(--success)':''; b.style.color=scanMode?'#fff':''; b.textContent=scanMode?'🔫 إيقاف وضع الماسح':'🔫 وضع الماسح'; } if(s){ if(scanMode){ s.placeholder='🔫 امسح الباركود الآن…'; s.value=''; s.focus(); } else { s.placeholder='ابحث بالكود أو الاسم…'; } } if(scanMode)scanFeedback('وضع الماسح مُفعّل: كل مسح يَعُدّ ١+ بصوت. اضغط الزر لإيقافه.',true); else if($('scanStatus'))$('scanStatus').style.display='none'; }
function startCamera(){ ensureAudio(); if(!('BarcodeDetector' in window)){ scanFeedback('مسح الكاميرا غير مدعوم في هذا المتصفح — استخدم «وضع الماسح» مع جهاز ماسح، أو متصفّح Chrome على أندرويد.', false); return; } if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){ scanFeedback('الكاميرا غير متاحة على هذا المتصفح.', false); return; } navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then((stream)=>{ const v=$('camVideo'); v.srcObject=stream; v.play(); $('camOverlay').style.display='flex'; _camStream=stream; _camOn=true; _lastScan=''; _lastT=0; const det=new window.BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','upc_a','upc_e','itf','codabar','qr_code']}); const loop=()=>{ if(!_camOn)return; det.detect(v).then((codes)=>{ if(codes&&codes.length){ const c=codes[0].rawValue; const now=Date.now(); if(c!==_lastScan||now-_lastT>1500){ _lastScan=c; _lastT=now; handleScanCode(c); } } }).catch(()=>{}); setTimeout(loop,250); }; loop(); }).catch((e)=>{ scanFeedback('تعذّر فتح الكاميرا: '+((e&&e.message)||e), false); }); }
function stopCamera(){ _camOn=false; try{ if(_camStream)_camStream.getTracks().forEach(t=>t.stop()); }catch(e){} _camStream=null; const o=$('camOverlay'); if(o)o.style.display='none'; }

// ===== VARIANCE REPORT (تقرير الفروقات — المرحلة 5) =====
// تجميع «من أضاف» من إدخالات العدّ: اسم الفاعل مقابل مجموع كميّته.
function repAgg(entries){
  const m={}; (entries||[]).forEach(e=>{const n=(e&&e.byName!=null?String(e.byName).trim():'')||'—'; m[n]=(m[n]||0)+(e&&e.q?e.q:0);});
  return Object.keys(m).map(n=>({name:n,q:m[n]})).sort((a,b)=>b.q-a.q);
}
// محرك حساب الفروقات: لكل صنف حالة وفرق وقيمة بالتكلفة.
function computeVariance(items,counts){
  return (items||[]).map(it=>{
    const cc=counts?counts[String(it.code)]:null;
    const isCounted=!!cc;
    const counted=isCounted?(cc.qty==null?0:Number(cc.qty)):null;
    const book=(it.book!=null&&!isNaN(it.book))?Number(it.book):null;
    const cost=(it.cost!=null&&!isNaN(it.cost))?Number(it.cost):null;
    const base=book!=null?book:0;
    let diff, hasDiff;
    if(isCounted){ diff=counted-base; hasDiff=true; }
    else if(book!=null){ diff=-base; hasDiff=true; } // غير المعدود = صفر بإفصاح
    else { diff=0; hasDiff=false; }
    let status;
    if(!isCounted) status='uncounted';
    else if(book==null) status='nobook';
    else if(Math.abs(diff)<1e-9) status='match';
    else status=diff>0?'surplus':'deficit';
    const varValue=(cost!=null&&hasDiff)?diff*cost:null;
    const bookValue=(cost!=null&&book!=null)?book*cost:null;
    const countedValue=(cost!=null&&isCounted)?counted*cost:null;
    return {code:it.code,name:it.name||'',category:(it.category!=null?String(it.category).trim():''),unit:it.unit||'',
      book,counted,isCounted,cost,diff,hasDiff,status,varValue,bookValue,countedValue,
      who:isCounted?repAgg(cc.entries):[], entries:isCounted&&cc.entries?cc.entries.length:0};
  });
}
// ملخصات إجمالية (صافي الفروقات محسوب على المعدود فقط؛ غير المعدود يُفصح عنه منفصلاً).
function summarize(rows){
  const s={total:rows.length,counted:0,uncounted:0,match:0,surplus:0,deficit:0,nobook:0,
    withCost:0,bookVal:0,countedVal:0,netVar:0,surplusVal:0,deficitVal:0,uncountedBookVal:0};
  rows.forEach(r=>{
    if(r.isCounted)s.counted++; else s.uncounted++;
    if(r.status==='match')s.match++; else if(r.status==='surplus')s.surplus++; else if(r.status==='deficit')s.deficit++; else if(r.status==='nobook')s.nobook++;
    if(r.cost!=null)s.withCost++;
    if(r.bookValue!=null)s.bookVal+=r.bookValue;
    if(r.countedValue!=null)s.countedVal+=r.countedValue;
    if(r.varValue!=null){ s.netVar+=r.varValue; if(r.varValue>0)s.surplusVal+=r.varValue; else if(r.varValue<0)s.deficitVal+=r.varValue; } // صافي = الفعلي − الدفتري (متّسق مع عمود قيمة الفرق وبطاقتَي القيمة)
    if(!r.isCounted&&r.bookValue!=null)s.uncountedBookVal+=r.bookValue;
  });
  return s;
}
// تجميع حسب الفئة (لملخص Excel والعرض).
function summarizeByCategory(rows){
  const map={};
  rows.forEach(r=>{const k=r.category||'(بلا فئة)';const g=map[k]||(map[k]={cat:k,items:0,counted:0,bookVal:0,countedVal:0,netVar:0});
    g.items++; if(r.isCounted)g.counted++;
    if(r.bookValue!=null)g.bookVal+=r.bookValue;
    if(r.countedValue!=null)g.countedVal+=r.countedValue;
    if(r.varValue!=null)g.netVar+=r.varValue;});
  return Object.keys(map).sort((a,b)=>a<b?-1:1).map(k=>map[k]);
}

function renderReportRows(){
  if(!$('repTable'))return;
  const q=($('repSearch')?$('repSearch').value:'').trim().toLowerCase();
  const cat=$('repCat')?$('repCat').value:'';
  const stf=$('repStatus')?$('repStatus').value:'all';
  const showWho=$('repWho')?$('repWho').checked:false;
  let rows=repRows;
  if(cat)rows=rows.filter(r=>r.category===cat);
  if(q)rows=rows.filter(r=>(r.code&&String(r.code).toLowerCase().indexOf(q)>=0)||(r.name&&String(r.name).toLowerCase().indexOf(q)>=0));
  if(stf==='var')rows=rows.filter(r=>r.status==='deficit'||r.status==='surplus');
  else if(stf==='counted')rows=rows.filter(r=>r.isCounted);
  else if(stf!=='all')rows=rows.filter(r=>r.status===stf);
  const shown=rows.slice(0,500);
  // إجماليات الأعمدة حسب المرشّح الحالي (على كامل المطابق لا المعروض فقط)
  let tBook=0,tCounted=0,tDiff=0,tVar=0,tBookVal=0,tCountedVal=0,aB=false,aC=false,aV=false,aBV=false,aCV=false;
  rows.forEach(r=>{ if(r.book!=null){tBook+=r.book;aB=true;} if(r.isCounted){tCounted+=r.counted;aC=true;} if(r.hasDiff)tDiff+=r.diff; if(r.varValue!=null){tVar+=r.varValue;aV=true;} if(r.bookValue!=null){tBookVal+=r.bookValue;aBV=true;} if(r.countedValue!=null){tCountedVal+=r.countedValue;aCV=true;} });
  const colored=(n,txt)=>'<span class="'+(n>1e-9?'dpos':(n<-1e-9?'dneg':''))+'">'+(n>0?'+':'')+txt+'</span>';
  const head='<table><thead><tr><th>الكود</th><th>الصنف</th><th>الفئة</th><th class="num">الدفتري</th><th class="num">المعدود</th><th class="num">الفرق</th><th>الحالة</th><th class="num">التكلفة</th><th class="num">القيمة الدفترية</th><th class="num">القيمة الفعلية</th><th class="num">قيمة الفرق</th>'+(showWho?'<th>من أضاف</th>':'')+'</tr></thead>';
  const body=shown.map(r=>{
    const diffCell=r.hasDiff?colored(r.diff,fmt(r.diff)):'—';
    const varCell=r.varValue!=null?colored(r.varValue,fmt(round2(r.varValue))):'—';
    const whoCell=showWho?'<td class="muted" style="font-size:12px">'+(r.who.length?r.who.map(w=>esc(w.name)+': '+fmt(w.q)).join('<br>'):'—')+'</td>':'';
    return '<tr><td class="num" style="direction:ltr;text-align:right"><span class="tag">'+esc(r.code)+'</span></td>'+
      '<td>'+esc(r.name)+'</td><td class="muted">'+esc(r.category||'—')+'</td>'+
      '<td class="num">'+(r.book!=null?fmt(r.book):'—')+'</td>'+
      '<td class="num">'+(r.isCounted?fmt(r.counted):'—')+'</td>'+
      '<td class="num">'+diffCell+'</td>'+
      '<td><span class="st '+r.status+'">'+STLABEL[r.status]+'</span></td>'+
      '<td class="num">'+(r.cost!=null?fmt(r.cost):'—')+'</td>'+
      '<td class="num">'+(r.bookValue!=null?fmt(round2(r.bookValue)):'—')+'</td>'+
      '<td class="num">'+(r.countedValue!=null?fmt(round2(r.countedValue)):'—')+'</td>'+
      '<td class="num">'+varCell+'</td>'+whoCell+'</tr>';
  }).join('');
  const tfoot=shown.length?('<tfoot><tr><td colspan="3">الإجمالي (حسب المرشّح) · '+fmt(rows.length)+' صنف</td>'+
    '<td class="num">'+(aB?fmt(round2(tBook)):'—')+'</td>'+
    '<td class="num">'+(aC?fmt(round2(tCounted)):'—')+'</td>'+
    '<td class="num">'+colored(tDiff,fmt(round2(tDiff)))+'</td>'+
    '<td></td><td></td>'+
    '<td class="num">'+(aBV?fmt(round2(tBookVal)):'—')+'</td>'+
    '<td class="num">'+(aCV?fmt(round2(tCountedVal)):'—')+'</td>'+
    '<td class="num">'+(aV?colored(tVar,fmt(round2(tVar))):'—')+'</td>'+
    (showWho?'<td></td>':'')+'</tr></tfoot>'):'';
  const bodyHtml=shown.length?body:'<tr><td colspan="'+(showWho?12:11)+'" class="muted" style="padding:14px">لا أصناف مطابقة للمرشّحات.</td></tr>';
  $('repTable').innerHTML=head+'<tbody>'+bodyHtml+'</tbody>'+tfoot+'</table>';
  if($('repNote'))$('repNote').textContent='عرض '+fmt(shown.length)+' من '+fmt(rows.length)+' صنف مطابق'+(rows.length>500?' — ضيّق بالبحث/الفئة أو صدّر Excel للكل':'')+'.';
}
function exportVarianceExcel(){
  if(typeof XLSX==='undefined'){alert('تعذّر إنشاء Excel (لا اتصال بالمكتبة).');return;}
  const rows=repRows;
  const detail=[['الكود','الصنف','الفئة','الوحدة','الرصيد الدفتري','المعدود','الفرق','الحالة','التكلفة','القيمة الدفترية','القيمة الفعلية','قيمة الفرق','من أضاف']];
  rows.forEach(r=>detail.push([r.code,r.name,r.category,r.unit,(r.book!=null?r.book:''),(r.isCounted?r.counted:''),(r.hasDiff?r.diff:''),STLABEL[r.status],(r.cost!=null?r.cost:''),(r.bookValue!=null?round2(r.bookValue):''),(r.countedValue!=null?round2(r.countedValue):''),(r.varValue!=null?round2(r.varValue):''),r.who.map(w=>w.name+': '+w.q).join(' / ')]));
  // صفّ إجماليات ورقة التفاصيل
  let eB=0,eC=0,eD=0,eV=0,eBV=0,eCV=0; rows.forEach(r=>{ if(r.book!=null)eB+=r.book; if(r.isCounted)eC+=r.counted; if(r.hasDiff)eD+=r.diff; if(r.varValue!=null)eV+=r.varValue; if(r.bookValue!=null)eBV+=r.bookValue; if(r.countedValue!=null)eCV+=r.countedValue; });
  detail.push([]);
  detail.push(['الإجمالي','','','',round2(eB),round2(eC),round2(eD),'','',round2(eBV),round2(eCV),round2(eV),'']);
  const cats=summarizeByCategory(rows);
  const summary=[['الفئة','عدد الأصناف','المعدود منها','قيمة الرصيد الدفتري','قيمة المعدود','صافي قيمة الفروقات']];
  cats.forEach(g=>summary.push([g.cat,g.items,g.counted,round2(g.bookVal),round2(g.countedVal),round2(g.netVar)]));
  const s=summarize(rows);
  summary.push([]);
  summary.push(['الإجمالي',s.total,s.counted,round2(s.bookVal),round2(s.countedVal),round2(s.netVar)]);
  summary.push(['لم تُعد بعد (قيمة دفترية)',s.uncounted,'','',round2(s.uncountedBookVal),'']);
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(detail); ws1['!cols']=[{wch:16},{wch:34},{wch:16},{wch:8},{wch:13},{wch:11},{wch:11},{wch:12},{wch:10},{wch:15},{wch:15},{wch:14},{wch:30}]; ws1['!views']=[{RTL:true}];
  const ws2=XLSX.utils.aoa_to_sheet(summary); ws2['!cols']=[{wch:22},{wch:12},{wch:12},{wch:18},{wch:16},{wch:18}]; ws2['!views']=[{RTL:true}];
  XLSX.utils.book_append_sheet(wb,ws1,'تفاصيل الفروقات');
  XLSX.utils.book_append_sheet(wb,ws2,'ملخص حسب الفئة');
  const nm=(repSess&&repSess.name?String(repSess.name):'الجرد').replace(/[\\\/:*?\[\]]/g,'_').slice(0,60);
  XLSX.writeFile(wb,'تقرير_الفروقات_'+nm+'.xlsx');
}
